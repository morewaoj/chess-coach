services:
  - type: web
    name: chess-coach-api
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MAX_TOKENS
        value: "650"
      - key: RAG_TOP_K
        value: "3"
      - key: RAG_CHUNK_CHARS
        value: "450"
